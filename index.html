<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>技术笔记</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            line-height: 1.6;
            color: #333;
            background: #f5f5f5;
        }

        /* 导航栏 */
        .navbar {
            background: #fff;
            border-bottom: 1px solid #e0e0e0;
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        .logo {
            font-size: 1.2rem;
            font-weight: 500;
            color: #333;
        }

        /* 主体内容 */
        .container {
            max-width: 900px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        /* 模块卡片 */
        .module-card {
            background: #fff;
            border-radius: 8px;
            padding: 2rem;
            margin-bottom: 2rem;
            border: 1px solid #e0e0e0;
        }

        .module-card h2 {
            font-size: 1.5rem;
            font-weight: 500;
            color: #333;
            margin-bottom: 1.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid #333;
        }

        .banner-image {
            width: 100%;
            max-height: 280px;
            object-fit: cover;
            border-radius: 4px;
            margin-bottom: 1.5rem;
        }

        /* 文章列表 */
        .article-list {
            margin-top: 1.5rem;
        }

        .article-item {
            padding: 1.5rem 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .article-item:last-child {
            border-bottom: none;
        }

        .article-item h4 {
            margin-bottom: 0.5rem;
        }

        .article-item h4 a {
            color: #333;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 500;
        }

        .article-item h4 a:hover {
            color: #666;
        }

        .article-item p {
            color: #666;
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 0.5rem;
        }

        .article-meta {
            font-size: 0.85rem;
            color: #999;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .container {
                padding: 0 1rem;
            }

            .module-card {
                padding: 1.5rem;
            }

            .nav-container {
                padding: 0 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">技术笔记</div>
        </div>
    </nav>

    <!-- 主体内容 -->
    <div class="container">
        <!-- CPU模块 -->
        <section class="module-card">
            <h2>CPU</h2>
            
            <div class="article-list">
                <div class="article-item">
                    <h4><a href="CPU/虚拟内存.html">虚拟内存：让程序以为自己拥有整个世界</a></h4>
                    <p>深入浅出地讲解虚拟内存的原理、工作机制和实际应用。通过生动的比喻和图解，帮助你理解这个操作系统的核心技术。</p>
                    <div class="article-meta">2026-03-06 · 约15分钟</div>
                </div>
            </div>
        </section>
    </div>
</body>
</html>
