# Site settings
title: "粟维桐的博客"
description: "GPGPU 架构工程师 | AI 硬件 | 技术笔记与随想"
url: "https://suwtong.github.io"
baseurl: ""

# Author
author:
  name: "粟维桐"
  email: "1329610561@qq.com"
  bio: "GPGPU Architecture Engineer | AI Hardware"

# Build settings
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Collections
collections:
  knowledge:
    output: true
    permalink: /knowledge/:title/
  thoughts:
    output: true
    permalink: /thoughts/:title/
  interests:
    output: true
    permalink: /interests/:title/

# Defaults
defaults:
  - scope:
      path: ""
      type: "knowledge"
    values:
      layout: "post"
      category: "knowledge"
  - scope:
      path: ""
      type: "thoughts"
    values:
      layout: "post"
      category: "thoughts"
  - scope:
      path: ""
      type: "interests"
    values:
      layout: "post"
      category: "interests"

# Markdown
markdown: kramdown
highlighter: rouge

# Exclude
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - README.md
